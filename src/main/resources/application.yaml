# =============================================================================
# Default: PostgreSQL (no profile or spring.profiles.active=postgresql)
# =============================================================================
spring:
  application:
    name: pet
  datasource:
    url: jdbc:postgresql://localhost:5432/pet
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

app:
  database:
    type: postgresql
    jpa:
      show-sql: true
      ddl-auto: update

# =============================================================================
# Profile: postgresql (explicit; same as default)
# =============================================================================
---
spring:
  config:
    activate:
      on-profile: postgresql
  datasource:
    url: jdbc:postgresql://localhost:5432/pet
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

app:
  database:
    type: postgresql
    jpa:
      show-sql: true
      ddl-auto: update

# =============================================================================
# Profile: h2 — in-memory; use -Dspring.profiles.active=h2
# =============================================================================
---
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:petdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect

app:
  database:
    type: h2
    jpa:
      show-sql: false
      ddl-auto: update

# =============================================================================
# Profile: mongodb — use -Dspring.profiles.active=mongodb (requires spring-boot-starter-data-mongodb)
# =============================================================================
---
spring:
  config:
    activate:
      on-profile: mongodb
  data:
    mongodb:
      host: localhost
      port: 27017
      database: pet
      # username: optional
      # password: optional
      # uri: mongodb://localhost:27017/pet  # alternative to host/port/database

app:
  database:
    type: mongodb
